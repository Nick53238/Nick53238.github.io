  <head>

    <title>Image Gallary</title>
    <style>
      body {
        background: black;
        padding: 20px;
      }
      .back-button {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 20px;
        background: #29a0ef;
        color: rgb(251, 255, 0);

        border-radius: 5px;
      }

        background: #40a3ff;
      }
      .gallery {
        display: flex;

      .gallery img {
        width: 300px;
        height: auto;
        border: 2px solid lightblue;
        border-radius: 5px;
        object-fit: contain;
      }
